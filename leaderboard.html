  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .leaderboard-hero {
      background: linear-gradient(135deg, #022C22, #064E3B);
      padding: 60px 0;
      text-align: center;
      color: white;
    }
    .leaderboard-hero h1 {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #FBBF24, #FCD34D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .leaderboard-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    .leaderboard-tab {
      padding: 10px 24px;
      border-radius: 30px;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .leaderboard-tab.active {
      background: rgba(255,255,255,0.2);
      border-color: #FBBF24;
    }
    .leaderboard-tab:hover {
      background: rgba(255,255,255,0.1);
    }
    .leaderboard-list {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .leaderboard-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--border-color);
      transition: all 0.3s;
    }
    .leaderboard-card:hover {
      transform: translateX(5px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .leaderboard-rank {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #FBBF24, #FCD34D); color: white; font-size: 1.5rem; }
    .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A8A8A8); color: white; }
    .rank-3 { background: linear-gradient(135deg, #CD7F32, #B8860B); color: white; }
    .rank-other { background: var(--bg-primary); color: var(--text-primary); }
    .leaderboard-info { flex: 1; }
    .leaderboard-name { font-weight: 700; font-size: 1.1rem; }
    .leaderboard-bio { font-size: 0.8rem; color: #6B7280; }
    .leaderboard-stats {
      display: flex;
      gap: 16px;
      text-align: center;
    }
    .leaderboard-stat {
      font-size: 0.75rem;
    }
    .leaderboard-stat-value {
      font-weight: 700;
      font-size: 1rem;
    }
    .leaderboard-stat-label {
      color: #6B7280;
      font-size: 0.65rem;
    }
    .leaderboard-medal {
      font-size: 2rem;
    }
    @media (max-width: 600px) {
      .leaderboard-card {
        flex-direction: column;
        text-align: center;
      }
      .leaderboard-stats {
        justify-content: center;
      }
    }
  </style>
</head>

  <header class="site-header">

      <a class="brand" href="index.html">⚡ Bashiri Nasi</a>
      <nav class="nav-links">

        <a href="login.html" class="btn btn-outline btn-sm">Login</a>
        <a href="register.html" class="btn btn-primary btn-sm">Register</a>
      </nav>
    </div>
  </header>

  <section class="leaderboard-hero">
    <div class="container">
      <h1>🏆 Best Professionals</h1>
      <p style="color:rgba(255,255,255,0.8);font-size:1.1rem;">Look out for tipsters with high win rates</p>
     <div class="leaderboard-tabs">
    <button class="leaderboard-tab active" onclick="Leaderboard.load('all')">All Time</button>
    <button class="leaderboard-tab" onclick="Leaderboard.load('monthly')">This Month</button>
    <button class="leaderboard-tab" onclick="Leaderboard.load('weekly')">This Week</button>
    <button class="leaderboard-tab" onclick="Leaderboard.load('winrate')">By Win Rate</button>
</div>
    </div>
  </section>

  <div class="container">
    <div class="leaderboard-list" id="leaderboardList">
      <div style="text-align:center;padding:40px;">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#059669;"></i>
        <p>Friends with us</p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
