<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Bashiri Nasi</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-grid">
      <a class="brand" href="index.html">⚡ Bashiri Nasi</a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="btn btn-outline btn-sm">Home</a>
        <a href="login.html" class="btn btn-outline btn-sm">Login</a>
      </nav>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
          <h2>Create Account</h2>
          <p>Join Bashiri Nasi today</p>
        </div>
        <div class="auth-body">
          <form id="registerForm">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input type="text" id="phone" class="form-input" placeholder="0712345678" required>
              <span class="form-hint">Tanzanian phone number (e.g., 0712345678)</span>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
              <i class="fas fa-user-plus"></i> Create Account
            </button>
          </form>
          <div class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>
  
  <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()">
    <i class="fas fa-moon"></i>
  </button>

  <!-- IMPORTANT: Load main script FIRST -->
  <script src="assets/js/script.js"></script>
  
  <script>
    function toggleDarkMode() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('bashiri_theme', next);
      var btn = document.getElementById('darkModeToggle');
      if (btn) btn.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    
    (function() {
      var saved = localStorage.getItem('bashiri_theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        var btn = document.getElementById('darkModeToggle');
        if (btn) btn.innerHTML = '<i class="fas fa-sun"></i>';
      }
    })();
  </script>
</body>
</html>
